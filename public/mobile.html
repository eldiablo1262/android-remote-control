<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remote Control</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#000;color:#fff;
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }
    .screen{
      position:fixed;top:0;left:0;right:0;bottom:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:30px;text-align:center;
    }
    .hidden{display:none!important}
    .btn{
      width:140px;height:140px;border-radius:50%;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex;align-items:center;justify-content:center;
      font-size:3rem;margin-bottom:24px;
      box-shadow:0 8px 40px rgba(102,126,234,0.5);
      cursor:pointer;
      animation:pulse 2s infinite;
    }
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    .title{font-size:1.2rem;color:#667eea;margin-bottom:10px;font-weight:700}
    .msg{font-size:1rem;color:#ccc;line-height:1.6;max-width:300px}
    .sub{font-size:0.75rem;color:#555;margin-top:16px;max-width:280px}
    .live-dot{
      width:16px;height:16px;background:#00ff00;border-radius:50%;
      margin-bottom:16px;animation:blink 1.2s infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
    .stop{
      margin-top:30px;padding:12px 30px;
      border:2px solid #ff4444;background:transparent;
      color:#ff4444;border-radius:8px;font-size:0.9rem;cursor:pointer;
    }
    .error{
      background:#1a0000;border:1px solid #440000;border-radius:8px;
      padding:14px;margin-top:20px;max-width:300px;
      font-size:0.8rem;color:#ff8888;line-height:1.5;
    }
  </style>
</head>
<body>

  <!-- Screen 1: Start -->
  <div class="screen" id="startScreen">
    <div class="title">Partage d'ecran</div>
    <div class="btn" id="startBtn">📱</div>
    <div class="msg" id="mainMsg">Appuyez pour partager votre ecran</div>
    <div class="sub">Aucune application a installer</div>
    <div class="error hidden" id="errorBox"></div>
  </div>

  <!-- Screen 2: Active -->
  <div class="screen hidden" id="activeScreen">
    <div class="live-dot"></div>
    <div class="title" style="color:#00ff88">Ecran partage en direct</div>
    <div class="msg">Le PC peut voir et controler votre ecran</div>
    <button class="stop" id="stopBtn">Arreter le partage</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const sessionId = window.location.pathname.split('/').pop();
    const socket = io();
    let stream = null;
    let interval = null;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const video = document.createElement('video');
    video.autoplay = true; video.playsInline = true; video.muted = true;

    socket.emit('join-session', { sessionId, role: 'mobile' });

    document.getElementById('startBtn').onclick = startShare;
    document.getElementById('stopBtn').onclick = stopShare;

    async function startShare() {
      const msg = document.getElementById('mainMsg');
      const err = document.getElementById('errorBox');
      err.classList.add('hidden');

      try {
        stream = await navigator.mediaDevices.getDisplayMedia({
          video: { frameRate: { ideal: 10, max: 15 }, width: { max: 1280 }, height: { max: 720 } },
          audio: false
        });
      } catch (e) {
        if (e.name === 'NotAllowedError') {
          msg.textContent = 'Vous avez refuse. Appuyez a nouveau et acceptez.';
        } else {
          err.textContent = 'Erreur: ' + (e.message || 'Impossible de capturer l\'ecran');
          err.classList.remove('hidden');
          msg.textContent = 'Appuyez pour reessayer';
        }
        return;
      }

      // Success - switch to active screen
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('activeScreen').classList.remove('hidden');

      video.srcObject = stream;
      await video.play();

      // Notify server
      socket.emit('browser-frame-start', { sessionId });

      // Start sending frames
      const fps = 10;
      const quality = 0.45;
      interval = setInterval(() => {
        if (!stream || !video.videoWidth) return;
        const scale = Math.min(720 / video.videoHeight, 1);
        canvas.width = Math.round(video.videoWidth * scale);
        canvas.height = Math.round(video.videoHeight * scale);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
          if (!blob || !socket.connected) return;
          blob.arrayBuffer().then(buf => {
            const bytes = new Uint8Array(buf);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            socket.emit('browser-frame', { sessionId, frame: btoa(binary), timestamp: Date.now() });
          });
        }, 'image/jpeg', quality);
      }, 1000 / fps);

      // Handle stop from system UI
      stream.getVideoTracks()[0].onended = stopShare;
    }

    function stopShare() {
      if (interval) { clearInterval(interval); interval = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      document.getElementById('activeScreen').classList.add('hidden');
      document.getElementById('startScreen').classList.remove('hidden');
      document.getElementById('mainMsg').textContent = 'Appuyez pour repartager';
    }
  </script>
</body>
</html>
