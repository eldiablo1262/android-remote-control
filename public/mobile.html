<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remote Control - Configuration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 1.4rem;
      color: #667eea;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 12px;
    }
    .card .num {
      display: inline-flex;
      width: 28px; height: 28px;
      background: #667eea;
      color: #fff;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.85rem;
      margin-right: 10px;
    }
    .card p {
      font-size: 0.85rem;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .ws-box {
      background: #0a0a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #00ff88;
      word-break: break-all;
      margin: 10px 0;
      cursor: pointer;
      text-align: center;
    }
    .ws-box:active { background: #001a00; }
    .copy-msg {
      text-align: center;
      font-size: 0.7rem;
      color: #555;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-green { background: #002d00; color: #00ff88; }
    .badge-blue { background: #001a3d; color: #5599ff; }
    .steps-list {
      list-style: none;
      padding: 0;
    }
    .steps-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 0.85rem;
      color: #ccc;
      line-height: 1.5;
    }
    .download-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin: 12px 0;
    }
    .download-btn:active { opacity: 0.8; }
    .status-bar {
      background: #0a0a1a;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      animation: blink 2s infinite;
    }
    .dot-waiting { background: #ffd700; }
    .dot-connected { background: #00ff00; animation: none; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .status-text { font-size: 0.85rem; color: #aaa; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #0a0a1a;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #00ff88);
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Remote Control</h1>
    <p class="subtitle">Configuration du telephone</p>

    <!-- Auto-install progress -->
    <div class="card" id="installCard">
      <h2>Installation en cours...</h2>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p id="installStatus" style="margin-top:12px;">Telechargement de l'application...</p>
    </div>

    <!-- Status -->
    <div class="card">
      <div class="status-bar">
        <div class="status-dot dot-waiting" id="statusDot"></div>
        <span class="status-text" id="statusText">En attente...</span>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const sessionId = window.location.pathname.split('/').pop();
    const socket = io();
    const apkUrl = 'https://github.com/eldiablo1262/android-remote-control/releases/download/latest/remote-control.apk';

    socket.emit('join-session', { sessionId, role: 'mobile' });

    socket.on('session-update', (session) => {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (session.androidConnected) {
        dot.className = 'status-dot dot-connected';
        text.textContent = 'Connecte ! Ouvrez le Viewer sur PC.';
      } else {
        dot.className = 'status-dot dot-waiting';
        text.textContent = 'En attente de connexion de l\'app...';
      }
    });

    // Auto-download and install APK
    autoInstall();

    async function autoInstall() {
      const progress = document.getElementById('progressFill');
      const status = document.getElementById('installStatus');

      try {
        // Step 1: Download APK
        progress.style.width = '10%';
        status.textContent = 'Telechargement de l\'application...';

        const response = await fetch(apkUrl);
        if (!response.ok) throw new Error('Download failed');

        const contentLength = response.headers.get('content-length');
        const total = parseInt(contentLength) || 0;
        const reader = response.body.getReader();
        let received = 0;
        const chunks = [];

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          if (total > 0) {
            const pct = Math.round((received / total) * 80) + 10;
            progress.style.width = pct + '%';
            status.textContent = `Telechargement... ${Math.round(received / 1024)}KB / ${Math.round(total / 1024)}KB`;
          }
        }

        // Step 2: Create blob and trigger install
        progress.style.width = '90%';
        status.textContent = 'Preparation de l\'installation...';

        const blob = new Blob(chunks, { type: 'application/vnd.android.package-archive' });
        const url = URL.createObjectURL(blob);

        // Trigger download/install
        const a = document.createElement('a');
        a.href = url;
        a.download = 'remote-control.apk';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();

        progress.style.width = '100%';
        status.textContent = 'APK telecharge ! Ouvrez la notification pour installer.';

        // After download, try to open the app with deep link (auto-connect)
        const deepLink = `remotecontrol://connect?server=${encodeURIComponent(location.origin)}&session=${encodeURIComponent(sessionId)}`;
        
        setTimeout(() => {
          // Try deep link to auto-open app with config
          window.location.href = deepLink;
        }, 2000);

        // Update message after delay
        setTimeout(() => {
          document.getElementById('installCard').innerHTML = `
            <h2 style="color:#00ff88">APK telecharge</h2>
            <p>Ouvrez la notification pour installer, puis autorisez.</p>
            <p style="margin-top:12px;">
              <a href="${deepLink}" style="display:block; padding:12px; background:#667eea; color:#fff; border-radius:8px; text-decoration:none; text-align:center; font-weight:bold;">
                Ouvrir l'app Remote Control
              </a>
            </p>
            <p style="font-size:0.75rem; color:#555; margin-top:12px;">
              L'app se connectera automatiquement a cette session.
            </p>
          `;
        }, 4000);

      } catch (err) {
        // Fallback: direct link
        progress.style.width = '100%';
        progress.style.background = '#ff4444';
        status.innerHTML = `
          <a href="${apkUrl}" style="color:#667eea; font-size:1rem; font-weight:bold;">
            Appuyez ici pour telecharger
          </a>
          <br><br>
          <span style="font-size:0.75rem; color:#666;">
            Puis ouvrez le fichier telecharge pour installer.
          </span>
        `;
      }
    }
  </script>
</body>
</html>
