name: Build Android APK

on:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk android-app/app/build/outputs/apk/debug/remote-control.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-control-apk
          path: android-app/app/build/outputs/apk/debug/remote-control.apk

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Remote Control APK
          body: |
            Derniere version de l'app Android Remote Control.
            Telechargez remote-control.apk et installez-le sur votre telephone.
          files: android-app/app/build/outputs/apk/debug/remote-control.apk
          make_latest: true
          prerelease: false
